name = "MeasureRight"
client_id = ""
application_url = "https://your-app-url.com"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,read_inventory"

[auth]
redirect_urls = [ "https://your-app-url.com/api/auth/callback" ]

[webhooks]
api_version = "2024-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/webhooks"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/api/webhooks/orders-paid"

[pos]
embedded = false
